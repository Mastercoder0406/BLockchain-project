{% extends "base.html" %}

{% block content %}
<div class="card hero-card">
  <div class="card-body p-4">
    <h2 class="page-title">Revoke Credential</h2>
    <p class="text-muted">
      Revoke a KYC credential by its credential ID.
    </p>

    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="post" class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Credential ID</label>
        <input type="text" name="credentialId" class="form-control" required>
      </div>

      <div class="col-md-6">
        <label class="form-label">Reason</label>
        <input type="text" name="reason" class="form-control" value="Revoked by issuer">
      </div>

      <div class="col-12">
        <button type="submit" class="btn btn-danger">Revoke</button>
      </div>
    </form>

    {% if result %}
      <hr>
      <div class="alert alert-warning mt-3">{{ result }}</div>
    {% endif %}
  </div>
</div>
{% endblock %}
