<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Digital KYC System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .hero-card { border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
    .step-badge {
      display: inline-block;
      padding: .35rem .7rem;
      border-radius: 999px;
      background: #e9ecef;
      margin-right: .5rem;
      margin-bottom: .5rem;
      font-size: .9rem;
    }
    pre {
      background: #111827;
      color: #e5e7eb;
      padding: 1rem;
      border-radius: 12px;
      overflow-x: auto;
    }
    .page-title {
      font-weight: 700;
      letter-spacing: -.02em;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <span class="navbar-brand">Digital KYC System</span>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="/">Home</a>
      <a class="nav-link" href="/issuer">Issuer</a>
      <a class="nav-link" href="/subject">Subject</a>
      <a class="nav-link" href="/issue_kyc">Issue KYC</a>
      <a class="nav-link" href="/verify_kyc">Verify KYC</a>
      <a class="nav-link" href="/revoke_credential">Revoke</a>
    </div>
  </div>
</nav>

<div class="container py-4">
  {% block content %}{% endblock %}
</div>

</html>
